<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurevix Smart CRM Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #94a3b8;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .full {
      grid-column: 1 / -1;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #1e293b;
      border: 1px solid #334155;
      white-space: pre-wrap;
      display: none;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .success {
      background: rgba(34, 197, 94, 0.15);
      color: #86efac;
    }

    .warning {
      background: rgba(234, 179, 8, 0.15);
      color: #fde68a;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Aurevix Smart CRM Assistant</h1>
      <p>Assistente comercial com IA + Salesforce para captura inteligente de leads.</p>

      <div class="grid">
        <div>
          <input type="text" id="name" placeholder="Nome do contato" />
        </div>
        <div>
          <input type="email" id="email" placeholder="Email do contato" />
        </div>
        <div class="full">
          <input type="text" id="company" placeholder="Empresa" />
        </div>
        <div class="full">
          <textarea id="message" placeholder="Digite a mensagem do cliente..."></textarea>
        </div>
      </div>

      <button onclick="sendMessage()">Enviar para análise</button>

      <div id="result" class="result"></div>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const company = document.getElementById("company").value.trim();
      const message = document.getElementById("message").value.trim();
      const result = document.getElementById("result");

      if (!message) {
        alert("Digite uma mensagem.");
        return;
      }

      result.style.display = "block";
      result.innerText = "Processando...";

      try {
        const response = await fetch("http://127.0.0.1:8001/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: message,
            name: name || null,
            email: email || null,
            company: company || null
          })
        });

        const data = await response.json();

        const badge = data.salesforce_created
          ? '<div class="badge success">Lead criado no Salesforce</div>'
          : '<div class="badge warning">Lead ainda não criado</div>';

        result.innerHTML = `
Intenção: ${data.intent}
Resposta: ${data.reply}
Salesforce: ${data.salesforce_created ? "Sim" : "Não"}
Lead ID: ${data.lead_id || "Não disponível"}
${badge}
        `;
      } catch (error) {
        result.innerText = "Erro ao conectar com o backend.";
      }
    }
  </script>
</body>
</html>
